name: Pipeline Test for Ivanti

on: 
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev
      - qa
      - staging
      - prod

jobs: 
  build-and-test:

    runs-on: ubuntu-latest
    container: 
      image: gradle:8.14.0-jdk17

    steps: 
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            gradle-${{ runner.os }}

      - name: Run Gradle Build
        run: gradle build --exclude-task test

      - name: Run Gradle Tests
        run: gradle test jacocoTestReport --rerun-tasks

  deploy-dev:
    needs: build-and-test
    if: github.ref == 'refs/heads/dev' 
    runs-on: ubuntu-latest
    environment: dev
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Dev
        run: bash scripts/deploy-to-dev.sh

  deploy-qa:
    needs: build-and-test
    if: github.ref == 'refs/heads/qa' 
    runs-on: ubuntu-latest
    environment: qa
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to QA
        run: bash scripts/deploy-to-qa.sh

  deploy-staging:
    needs: build-and-test
    if: github.ref == 'refs/heads/staging' 
    runs-on: ubuntu-latest
    environment: staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Staging
        run: bash scripts/deploy-to-staging.sh

  deploy-prod:
    needs: build-and-test
    if: github.ref == 'refs/heads/prod' 
    runs-on: ubuntu-latest
    environment: prod
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Staging
        run: bash scripts/deploy-to-prod.sh
  
  sonar-scan:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'
      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
          restore-keys: ${{ runner.os }}-gradle
      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: gradle build sonar --info       

